name: Generate Snake

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

concurrency:
  group: profile-content-${{ github.repository }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Generate Snake
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: tobangado69
          # For private contribution parity, set repository secret GH_TOKEN (PAT with repo and read:user scopes).
          # Falls back to github.token for public-only contribution data.
          github_token: ${{ secrets.GH_TOKEN || github.token }}
          outputs: |
            output/github-contribution-grid-snake.svg
            output/github-contribution-grid-snake.gif

      - name: Push to GitHub
        uses: EndBug/add-and-commit@v9
        with:
          message: 'Generate contribution snake'
          add: 'output/github-contribution-grid-snake.*'
          pull: '--rebase --autostash'
