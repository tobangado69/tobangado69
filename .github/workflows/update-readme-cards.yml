name: Update README cards

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "profile/**"
      - "README.md"

concurrency:
  group: profile-content-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync to latest remote (before generating SVGs)
        run: |
          set -euo pipefail
          B="${GITHUB_REF_NAME:-main}"
          git fetch origin "+refs/heads/${B}:refs/remotes/origin/${B}"
          git reset --hard "origin/${B}"

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: "username=${{ github.repository_owner }}&show_icons=true&theme=tokyonight&hide_border=true&include_all_commits=true&count_private=true&rank_icon=github"
          path: profile/stats.svg
          token: ${{ secrets.GH_STATS_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&theme=tokyonight&hide_border=true&langs_count=8&count_private=true"
          path: profile/top-langs.svg
          token: ${{ secrets.GH_STATS_TOKEN }}

      - name: Generate streak card
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: "user=${{ github.repository_owner }}&theme=tokyonight&hide_border=true&disable_animations=true"
          path: profile/streak.svg
          token: ${{ secrets.GH_STATS_TOKEN }}

      - name: Generate activity graph
        run: |
          set -euo pipefail
          curl -fsSL --retry 5 --retry-all-errors --connect-timeout 10 \
            "https://github-readme-activity-graph.vercel.app/graph?username=${{ github.repository_owner }}&theme=tokyo-night&hide_border=true&area=true" \
            -o profile/activity-graph.svg

      - name: Generate trophies card
        run: |
          set -euo pipefail
          TROPHY_USERNAME="${{ github.repository_owner }}" \
          TROPHY_THEME="tokyonight" \
          TROPHY_MARGIN_W="4" \
          bash scripts/refresh-trophies.sh .

      - name: Generate pin — detect-price-by-photo
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: "username=${{ github.repository_owner }}&repo=detect-price-by-photo&theme=tokyonight&hide_border=true"
          path: profile/pin-detect-price-by-photo.svg
          token: ${{ secrets.GH_STATS_TOKEN }}

      - name: Generate pin — InboxIq
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: "username=${{ github.repository_owner }}&repo=InboxIq&theme=tokyonight&hide_border=true"
          path: profile/pin-InboxIq.svg
          token: ${{ secrets.GH_STATS_TOKEN }}

      - name: Generate snake svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            profile/github-contribution-grid-snake.svg
            profile/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Verify profile automation helper
        run: |
          bash tests/trophies-refresh.sh
          bash tests/profile-automation.sh

      - name: Validate profile assets and refresh README image URLs
        run: |
          set -euo pipefail
          PROFILE_REPOSITORY="${GITHUB_REPOSITORY}" \
          PROFILE_CACHE_BUST="${GITHUB_RUN_NUMBER}" \
          bash scripts/sync-profile-assets.sh .

      - name: Commit SVGs (no push)
        id: commit_svgs
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/ README.md
          if git diff --staged --quiet; then
            echo "No SVG changes; skipping commit."
            echo "has_commit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: update README stat cards"
          echo "has_commit=true" >> "$GITHUB_OUTPUT"

      - name: Rebase on origin and push
        if: steps.commit_svgs.outputs.has_commit == 'true'
        run: |
          set -euo pipefail
          TARGET="${GITHUB_REF_NAME:-main}"

          for attempt in 1 2 3 4 5; do
            git fetch origin "+refs/heads/${TARGET}:refs/remotes/origin/${TARGET}"
            git rebase "origin/${TARGET}"
            if git push origin "HEAD:refs/heads/${TARGET}"; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt/5); retrying..."
            sleep $((attempt * 5))
          done
          echo "Push failed after 5 attempts"
          exit 1
