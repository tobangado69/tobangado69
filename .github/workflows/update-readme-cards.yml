name: Update README cards

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: "username=${{ github.repository_owner }}&show_icons=true&theme=tokyonight&hide_border=true&include_all_commits=true"
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&theme=tokyonight&hide_border=true&langs_count=8"
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin — detect-price-by-photo
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: "username=${{ github.repository_owner }}&repo=detect-price-by-photo&theme=tokyonight&hide_border=true"
          path: profile/pin-detect-price-by-photo.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin — InboxIq
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: "username=${{ github.repository_owner }}&repo=InboxIq&theme=tokyonight&hide_border=true"
          path: profile/pin-InboxIq.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/
          git commit -m "chore: update README stat cards" || exit 0
          git push
