name: Update README cards

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: profile-content-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync to latest remote (before generating SVGs)
        run: |
          set -euo pipefail
          B="${GITHUB_REF_NAME:-main}"
          echo "DEBUG_STEP=sync_before_generate branch=${B}"
          git fetch origin "+refs/heads/${B}:refs/remotes/origin/${B}"
          git reset --hard "origin/${B}"

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: "username=${{ github.repository_owner }}&show_icons=true&theme=tokyonight&hide_border=true&include_all_commits=true"
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&theme=tokyonight&hide_border=true&langs_count=8"
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin — detect-price-by-photo
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: "username=${{ github.repository_owner }}&repo=detect-price-by-photo&theme=tokyonight&hide_border=true"
          path: profile/pin-detect-price-by-photo.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin — InboxIq
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: "username=${{ github.repository_owner }}&repo=InboxIq&theme=tokyonight&hide_border=true"
          path: profile/pin-InboxIq.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit SVGs (no push)
        id: commit_svgs
        run: |
          set -euo pipefail
          echo "DEBUG_STEP=commit_only_v2"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/
          if git diff --staged --quiet; then
            echo "No SVG changes; skipping commit."
            echo "has_commit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: update README stat cards"
          echo "has_commit=true" >> "$GITHUB_OUTPUT"

      - name: Rebase on origin and push
        if: steps.commit_svgs.outputs.has_commit == 'true'
        run: |
          set -euo pipefail
          TARGET="${GITHUB_REF_NAME:-main}"
          echo "DEBUG_STEP=push_rebase_v2 branch=${TARGET}"

          for attempt in 1 2 3 4 5; do
            git fetch origin "+refs/heads/${TARGET}:refs/remotes/origin/${TARGET}"
            git rebase "origin/${TARGET}"
            if git push origin "HEAD:refs/heads/${TARGET}"; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt/5); retrying..."
            sleep $((attempt * 5))
          done
          echo "Push failed after 5 attempts"
          exit 1
