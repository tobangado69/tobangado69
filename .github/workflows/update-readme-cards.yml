name: Update README cards

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: profile-content-${{ github.repository }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync to latest remote (before generating SVGs)
        run: |
          set -euo pipefail
          B="${GITHUB_REF_NAME:-main}"
          # #region agent log
          echo "{\"sessionId\":\"62be0f\",\"hypothesisId\":\"H2\",\"location\":\"update-readme-cards:pre-sync\",\"message\":\"start\",\"data\":{\"branch\":\"$B\",\"head\":\"$(git rev-parse HEAD)\",\"ref\":\"${GITHUB_REF:-}\"},\"timestamp\":$(($(date +%s) * 1000))}"
          # #endregion
          git fetch origin "+refs/heads/${B}:refs/remotes/origin/${B}"
          git reset --hard "origin/${B}"
          # #region agent log
          echo "{\"sessionId\":\"62be0f\",\"hypothesisId\":\"H4\",\"location\":\"update-readme-cards:post-sync\",\"message\":\"after hard reset\",\"data\":{\"head\":\"$(git rev-parse HEAD)\",\"origin\":\"$(git rev-parse "origin/${B}")\"},\"timestamp\":$(($(date +%s) * 1000))}"
          # #endregion

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: "username=${{ github.repository_owner }}&show_icons=true&theme=tokyonight&hide_border=true&include_all_commits=true"
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&theme=tokyonight&hide_border=true&langs_count=8"
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin — detect-price-by-photo
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: "username=${{ github.repository_owner }}&repo=detect-price-by-photo&theme=tokyonight&hide_border=true"
          path: profile/pin-detect-price-by-photo.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pin — InboxIq
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: pin
          options: "username=${{ github.repository_owner }}&repo=InboxIq&theme=tokyonight&hide_border=true"
          path: profile/pin-InboxIq.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          set -euo pipefail
          # #region agent log
          echo "{\"sessionId\":\"62be0f\",\"hypothesisId\":\"H1\",\"location\":\"update-readme-cards:commit\",\"message\":\"workflow_version=v3-split-sync\",\"data\":{\"github_ref_name\":\"${GITHUB_REF_NAME:-}\",\"github_ref\":\"${GITHUB_REF:-}\"},\"timestamp\":$(($(date +%s) * 1000))}"
          # #endregion

          TARGET="${GITHUB_REF_NAME:-main}"
          echo "Pushing to branch: $TARGET"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config pull.rebase true

          git add profile/
          if git diff --staged --quiet; then
            echo "No SVG changes; skipping commit."
            exit 0
          fi

          git commit -m "chore: update README stat cards"

          # #region agent log
          echo "{\"sessionId\":\"62be0f\",\"hypothesisId\":\"H3\",\"location\":\"update-readme-cards:pre-push\",\"message\":\"after commit\",\"data\":{\"head\":\"$(git rev-parse HEAD)\",\"origin_target\":\"$(git rev-parse "origin/${TARGET}" 2>/dev/null || echo missing)\"},\"timestamp\":$(($(date +%s) * 1000))}"
          # #endregion

          for attempt in 1 2 3 4 5; do
            git fetch origin "+refs/heads/${TARGET}:refs/remotes/origin/${TARGET}"
            git rebase "origin/${TARGET}"
            # #region agent log
            echo "{\"sessionId\":\"62be0f\",\"hypothesisId\":\"H5\",\"location\":\"update-readme-cards:push-attempt\",\"message\":\"attempt\",\"data\":{\"n\":$attempt,\"head\":\"$(git rev-parse HEAD)\",\"origin\":\"$(git rev-parse "origin/${TARGET}")\"},\"timestamp\":$(($(date +%s) * 1000))}"
            # #endregion
            if git push origin "HEAD:refs/heads/${TARGET}"; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt/5); remote moved — fetching and rebasing again..."
            sleep $((attempt * 5))
          done
          echo "Push failed after 5 attempts"
          exit 1
